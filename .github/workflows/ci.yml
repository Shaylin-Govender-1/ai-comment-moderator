name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Lint (ruff)
        run: ruff check .

      - name: Run tests with coverage
        # No ANTHROPIC_API_KEY is set: the suite mocks the LLM, so tests run
        # fully offline and deterministically. Coverage is gated at 100%
        # (statement + branch) via [tool.coverage.report] in pyproject.toml.
        run: pytest --cov=app --cov-branch --cov-report=term-missing
